# DNS Proxy конфигурация
dns_listen: "0.0.0.0:5353"
http_listen: "0.0.0.0:8054"
log_level: "debug"  # Включите debug для тестирования
log_format: "json"

# SLA для клиента - 100ms
timeouts:
  total: 100ms       # Общий SLA для клиента
  cloud_api: 2000ms  # Таймаут для Cloud API (фоновый)
  cache_read: 5ms
  cache_write: 100ms
  dns_response: 80ms # Таймаут на резолвинг реального IP

cloud_api:
  url: "https://172.16.10.33/api/"
  key: "${CLOUD_API_KEY}"
  rate_limit: 10     # Увеличиваем rate limit
  burst: 5
  timeout: 2000ms    # 2 секунды для Cloud API

sinkholes:
  categories:
    1: "0.0.0.0"
    2: "0.0.0.1"
    3: "0.0.0.2"
    8: "0.0.0.3"
  default: "0.0.0.0"
  ipv6: "::1"

ttl:
  by_category:
    0: 300      # Разрешено
    1: 3600     # Заблокировано
    2: 3600
    3: 3600
    8: 3600
    9: 86400    # Белый список
  fallback: 300
  min: 30
  max: 86400

cache:
  strategy: "hybrid"
  memory:
    max_size_mb: 100
    default_expiration: 5m
    cleanup_interval: 10m
  valkey:
    address: "valkey:6379"
    password: "${VALKEY_PASSWORD}"
    pool_size: 100
    read_timeout: 5ms
    write_timeout: 100ms

metrics:
  prometheus_enabled: true
  prefix: "dns_proxy_"
  collect_interval: 30s
