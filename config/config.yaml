# DNS Proxy конфигурация
dns_listen: "0.0.0.0:5353"
http_listen: "0.0.0.0:8054"
log_level: "info"
log_format: "json"

# ТАЙМАУТЫ ДЛЯ КОНТРОЛЯ SLA 100ms
timeouts:
  total: 95ms
  cloud_api: 50ms
  cache_read: 5ms
  cache_write: 100ms
  dns_response: 10ms

cloud_api:
  url: "https://172.16.10.33/api/"
  key: "${CLOUD_API_KEY}"  # Это будет X-PAN-KEY
  rate_limit: 5
  burst: 2
  timeout: 50ms

sinkholes:
  categories:
    1: "0.0.0.0"
    2: "0.0.0.1"
    3: "0.0.0.2"
    8: "0.0.0.3"
  default: "0.0.0.0"
  ipv6: "::1"

ttl:
  by_category:
    0: 300
    1: 3600
    2: 3600
    3: 3600
    8: 3600
    9: 86400
  fallback: 300
  min: 30
  max: 86400

cache:
  strategy: "hybrid"
  memory:
    max_size_mb: 100
    default_expiration: 5m
    cleanup_interval: 10m
  valkey:
    address: "valkey:6379"
    password: "${VALKEY_PASSWORD}"
    pool_size: 100
    read_timeout: 5ms
    write_timeout: 100ms

metrics:
  prometheus_enabled: true
  prefix: "dns_proxy_"
  collect_interval: 30s
