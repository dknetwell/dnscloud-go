logging:
  level: info
  syslog: false

dns:
  listen_udp: ":53"
  listen_tcp: ":53"
  upstream:
    - "8.8.8.8:53"
    - "1.1.1.1:53"
  sinkhole_ipv4: "0.0.0.0"
  sinkhole_ipv6: "::"
  max_packet_size: 1232

cloud_api:
  endpoint: "https://api.example.com/check"
  api_key: "CHANGE_ME"
  insecure_skip_verify: false
  rate_limit: 50
  burst: 20
  timeout_seconds: 2

ttl:
  default: 60
  min: 30
  max: 3600

cache:
  max_cost: 10000000

valkey:
  address: "valkey:6379"
  password: ""
  db: 0

engine:
  worker_count: 50
  worker_queue_size: 10000

http:
  listen: ":8080"
