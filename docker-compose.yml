version: '3.8'

networks:
  dns-net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.10.0/24

volumes:
  valkey-data:
  logs:

services:
  # Valkey для распределенного кеша
  valkey:
    image: valkey/valkey:latest
    container_name: dns-valkey
    restart: unless-stopped
    ports:
      - "6379:6379"
    environment:
      - VALKEY_PASSWORD=${VALKEY_PASSWORD:-SecurePass123}
    volumes:
      - valkey-data:/data
    networks:
      dns-net:
        ipv4_address: 10.10.10.11
    command: >
      --requirepass ${VALKEY_PASSWORD:-SecurePass123}
      --appendonly yes
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${VALKEY_PASSWORD:-SecurePass123}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # CoreDNS с нашим плагином
  coredns:
    build:
      context: .
      dockerfile: Dockerfile.coredns
    container_name: dns-proxy
    restart: unless-stopped
    ports:
      - "53:53/udp"
      - "53:53/tcp"
      - "8080:8080"  # Health
      - "9091:9091"  # Prometheus
    volumes:
      - ./config/config.yaml:/app/config/config.yaml
      - ./logs:/var/log
      - /etc/localtime:/etc/localtime:ro
    environment:
      - CLOUD_API_KEY=${CLOUD_API_KEY}
      - CLOUD_API_URL=${CLOUD_API_URL:-https://172.16.10.33/api/}
      - CLOUD_DNS_SERVER=${CLOUD_DNS_SERVER:-172.16.10.34:53}
      - VALKEY_PASSWORD=${VALKEY_PASSWORD:-SecurePass123}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - RATE_LIMIT_RPS=${RATE_LIMIT_RPS:-5}
    networks:
      dns-net:
        ipv4_address: 10.10.10.31
    depends_on:
      valkey:
        condition: service_healthy
    cap_add:
      - NET_ADMIN
      - NET_RAW
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
