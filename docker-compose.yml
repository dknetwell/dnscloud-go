services:

  valkey:
    image: valkey/valkey:7.2.5-alpine
    container_name: valkey
    restart: unless-stopped
    command: valkey-server --save 60 100 --appendonly yes
    volumes:
      - valkey-data:/data
    networks:
      dnsnet:
        ipv4_address: 172.28.0.10
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  dns-proxy:
    build: .
    container_name: dns-proxy
    restart: unless-stopped
    depends_on:
      valkey:
        condition: service_healthy
    networks:
      dnsnet:
        ipv4_address: 172.28.0.20
    env_file:
      - .env
    volumes:
      - ./config:/app/config:ro
    environment:
      VALKEY_ADDR: valkey:6379
      DNS_LISTEN_UDP: ":53"
      DNS_LISTEN_TCP: ":53"
      ENGINE_WORKERS: "200"
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  coredns:
    image: coredns/coredns:1.14.1
    container_name: coredns
    restart: unless-stopped
    depends_on:
      dns-proxy:
        condition: service_healthy
    networks:
      dnsnet:
        ipv4_address: 172.28.0.30
    volumes:
      - ./Corefile:/Corefile
      - ./certs:/certs:ro
    command: -conf /Corefile
    ports:
      - "53:53/udp"
      - "53:53/tcp"
      - "853:853/tcp"
      - "443:443/tcp"

networks:
  dnsnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  valkey-data:
