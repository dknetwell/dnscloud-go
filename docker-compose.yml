version: '3.8'

services:
  valkey:
    image: valkey/valkey:7.2.5-alpine
    container_name: dns-valkey
    restart: unless-stopped
    ports:
      - "6379:6379"
    environment:
      - VALKEY_PASSWORD=${VALKEY_PASSWORD:-SecurePass123!}
    command: >
      --requirepass ${VALKEY_PASSWORD:-SecurePass123!}
      --appendonly yes
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${VALKEY_PASSWORD:-SecurePass123!}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    volumes:
      - valkey-data:/data

  dns-proxy:
    build:
      context: .
      dockerfile: Dockerfile.coredns
    container_name: dns-proxy
    restart: unless-stopped
    ports:
      - "53:53/udp"
      - "53:53/tcp"
      - "8080:8080"
      - "9091:9091"
    environment:
      - CLOUD_API_KEY=${CLOUD_API_KEY}
      - CLOUD_API_URL=${CLOUD_API_URL:-https://172.16.10.33/api/}
      - CLOUD_DNS_SERVER=${CLOUD_DNS_SERVER:-172.16.10.34:53}
      - VALKEY_PASSWORD=${VALKEY_PASSWORD:-SecurePass123!}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ./config/config.yaml:/app/config/config.yaml:ro
      - ./data:/app/data:ro
      - ./logs:/var/log
    depends_on:
      valkey:
        condition: service_healthy
    cap_add:
      - NET_BIND_SERVICE
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8080 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  valkey-data:
