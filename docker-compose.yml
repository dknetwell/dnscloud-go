services:
  # CoreDNS как фронтенд
  coredns:
    image: coredns/coredns:1.14.1
    container_name: dns-frontend
    restart: unless-stopped
    ports:
      - "53:53/udp"      # Basic DNS UDP
      - "53:53/tcp"      # Basic DNS TCP
      - "853:853/tcp"    # DNS-over-TLS
      - "443:443/tcp"    # DNS-over-HTTPS
      - "8080:8080"      # Health
      - "9091:9091"      # Prometheus
    volumes:
      - ./Corefile:/Corefile:ro
      - ./certs:/certs:ro
    command: ["-conf", "/Corefile"]
    cap_add:
      - NET_BIND_SERVICE
    networks:
      - dns-net
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # DNS Proxy приложение
  dns-proxy:
    build: .
    container_name: dns-proxy
    restart: unless-stopped
    environment:
      - CLOUD_API_KEY=${CLOUD_API_KEY}
      - CLOUD_API_URL=${CLOUD_API_URL:-https://172.16.10.33/api/}
      - VALKEY_PASSWORD=${VALKEY_PASSWORD:-SecurePass123!}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ./config:/app/config:ro
    networks:
      - dns-net
    depends_on:
      valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8054/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Valkey кеш
  valkey:
    image: valkey/valkey:7.2.5-alpine
    container_name: dns-valkey
    restart: unless-stopped
    environment:
      - VALKEY_PASSWORD=${VALKEY_PASSWORD:-SecurePass123!}
    command: >
      --requirepass ${VALKEY_PASSWORD:-SecurePass123!}
      --appendonly yes
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
    volumes:
      - valkey-data:/data
    networks:
      - dns-net
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${VALKEY_PASSWORD:-SecurePass123!}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

networks:
  dns-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  valkey-data:
