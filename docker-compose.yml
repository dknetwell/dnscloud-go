services:
  coredns:
    image: coredns/coredns:1.14.1
    container_name: dns-frontend
    restart: unless-stopped
    ports:
      - "53:53/udp"
      - "53:53/tcp"
      - "853:853/tcp"
      - "443:443/tcp"
      - "8080:8080"
      - "9091:9091"
    volumes:
      - ./Corefile:/Corefile:ro
      - ./certs:/certs:ro
    command: ["-conf", "/Corefile"]
    cap_add:
      - NET_BIND_SERVICE
    networks:
      dns-net:
        aliases:
          - coredns.local
    extra_hosts:
      - "dns-proxy:172.20.0.3"
    depends_on:
      dns-proxy:
        condition: service_healthy
    # Отключаем health check или упрощаем
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8080/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
